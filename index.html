            </div>
        </div>

                    <span>{{opName}}</span>
                </label>
            </div>
        </div>

        <button @click="generatePhone" class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition">
            立即生成号码

        <div v-if="generatedNumber" class="mt-6 p-4 bg-gray-50 rounded-lg text-center">
