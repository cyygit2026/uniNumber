<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机手机号生成器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 md:p-20">

<div id="app" class="max-w-lg mx-auto bg-white p-8 rounded-xl shadow-md">
    <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">手机号模拟生成器</h1>

    <!-- 地区选择 -->
    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">省/市/区 (演示用)</label>
            <div class="grid grid-cols-3 gap-2 mt-1">
                <select v-model="selectedProv" class="border rounded p-2">
                    <option v-for="p in provinces" :key="p" :value="p">{{p}}</option>
                </select>
                <select v-model="selectedCity" class="border rounded p-2">
                    <option v-for="c in cities" :key="c" :value="c">{{c}}</option>
                </select>
                <select v-model="selectedDist" class="border rounded p-2">
                    <option v-for="d in districts" :key="d" :value="d">{{d}}</option>
                </select>
            </div>
        </div>

        <!-- 运营商选择 -->
        <div>
            <label class="block text-sm font-medium text-gray-700">选择运营商</label>
            <div class="flex flex-wrap gap-4 mt-2">
                <label v-for="(prefixes, op) in operators" :key="op" class="inline-flex items-center cursor-pointer">
                    <input type="radio" v-model="selectedOp" :value="op" class="form-radio text-blue-600">
                    <span class="ml-2 text-sm">{{ op }}</span>
                </label>
            </div>
        </div>

        <!-- 生成按钮 -->
        <button @click="generatePhone" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
            立即生成号码
        </button>

        <!-- 结果显示 -->
        <div v-if="generatedNumber" class="mt-8 p-6 bg-blue-50 border-2 border-dashed border-blue-200 rounded-lg text-center">
            <p class="text-gray-500 text-sm mb-1">{{selectedProv}} · {{selectedCity}} · {{selectedOp}}</p>
            <p class="text-3xl font-mono font-bold text-blue-700 tracking-wider">
                {{ formatPhone(generatedNumber) }}
            </p>
            <p class="text-xs text-gray-400 mt-2">* 此号码由规则随机生成，仅供测试展示</p>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            // 模拟地区数据
            const provinces = ["广东省", "北京市", "上海市"];
            const cityData = {
                "广东省": ["广州市", "深圳市", "珠海市"],
                "北京市": ["北京市"],
                "上海市": ["上海市"]
            };
            const distData = {
                "广州市": ["天河区", "越秀区", "海珠区"],
                "深圳市": ["南山区", "福田区", "宝安区"],
                "北京市": ["朝阳区", "海淀区", "东城区"]
            };

            const selectedProv = ref("广东省");
            const selectedCity = ref("广州市");
            const selectedDist = ref("天河区");

            // 运营商号段规则
            const operators = {
                "中国移动": ["134", "135", "136", "137", "138", "139", "147", "150", "151", "152", "157", "158", "159", "172", "178", "182", "183", "184", "187", "188", "195", "197", "198"],
                "中国联通": ["130", "131", "132", "145", "155", "156", "166", "175", "176", "185", "186", "196"],
                "中国电信": ["133", "149", "153", "173", "177", "180", "181", "189", "190", "191", "193", "199"],
                "中国广电": ["192"]
            };

            const selectedOp = ref("中国移动");
            const generatedNumber = ref("");

            const cities = computed(() => cityData[selectedProv.value] || []);
            const districts = computed(() => distData[selectedCity.value] || []);

            // 生成逻辑
            const generatePhone = () => {
                const prefixList = operators[selectedOp.value];
                // 1. 随机选号段
                const prefix = prefixList[Math.floor(Math.random() * prefixList.length)];
                // 2. 随机生成后8位
                let suffix = "";
                for (let i = 0; i < 8; i++) {
                    suffix += Math.floor(Math.random() * 10);
                }
                generatedNumber.value = prefix + suffix;
            };

            // 格式化 13812345678 -> 138 1234 5678
            const formatPhone = (num) => {
                return num.replace(/(\d{3})(\d{4})(\d{4})/, '$1 $2 $3');
            };

            return {
                provinces, cities, districts,
                selectedProv, selectedCity, selectedDist,
                operators, selectedOp,
                generatedNumber, generatePhone, formatPhone
            }
        }
    }).mount('#app')
</script>
</body>
</html>
